<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Chat App</title>
    <style>
        /* Basic WhatsApp Style UI */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #e5ddd5; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; }
        .login-box { padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 80%; max-width: 300px; text-align: center; }
        .login-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .login-box button { width: 100%; padding: 10px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #main-screen { display: none; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #075E54; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header button { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px; border-radius: 10px; position: relative; word-wrap: break-word; }
        .msg.sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; }
        .msg.received { background: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
        
        /* WhatsApp like Bottom Input Area */
        .input-area { display: flex; padding: 10px; background: #f0f0f0; align-items: center; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; }
        .icon-btn { background: #075E54; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mic-recording { background: red !important; animation: pulse 1s infinite; }
        
        #video-container { display: none; background: #000; position: relative; height: 30vh; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #localVideo { position: absolute; bottom: 10px; right: 10px; width: 80px; height: 120px; border-radius: 10px; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Welcome</h2>
            <input type="text" id="userId" placeholder="Enter ID">
            <input type="password" id="userPass" placeholder="Enter Password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="header">
            <h3 id="chat-title" style="margin: 0;">Chat</h3>
            <div>
                <button onclick="startVideoCall()">📹</button>
                <button onclick="endVideoCall()" style="color: red; display: none;" id="endCallBtn">❌</button>
            </div>
        </div>

        <div id="video-container">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleTyping()">
            <button class="icon-btn" id="micBtn" onclick="toggleMic()">🎤</button>
            <button class="icon-btn" onclick="sendTextMessage()">➤</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
